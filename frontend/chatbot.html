<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FarmWise Bot</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    /* ================= ROOT VARIABLES ================= */
    :root {
      --green: #2ECC71;
      --bg: #EAF4EE;
      --white: #fff;
      --text: #202123;
      --border: #dee2e6;
    }

    body.dark {
      --bg: #0d1117;
      --white: #161b22;
      --text: #c9d1d9;
      --border: #30363d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 260px;
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 15px;
    }

    .new-chat {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer;
    }

    /* ================= MAIN ================= */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-family: Inter, sans-serif;
      font-weight: 800;
      color: var(--green);
    }

    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      max-width: 80%;
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 14px;
    }

    .bot {
      background: var(--white);
      border: 1px solid var(--border);
    }

    .user {
      background: #DCF8C6;
      margin-left: auto;
    }

    footer {
      padding: 15px;
      border-top: 1px solid var(--border);
      background: var(--white);
    }

    form {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      outline: none;
    }

    button.send {
      background: var(--green);
      border: none;
      color: white;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar">
    <button class="new-chat" onclick="newChat()">➕ New Chat</button>
  </aside>

  <!-- ================= MAIN ================= -->
  <div class="main">
    <header>
      <h1>FarmWise</h1>
      <button onclick="toggleTheme()">🌙</button>
    </header>

    <div class="chat" id="chat"></div>

    <footer>
      <form id="chatForm">
        <input id="message" placeholder="Ask about crops, soil, pests..." />
        <button class="send">➤</button>
      </form>
    </footer>
  </div>

  <script>
    /* ================= CONFIG ================= */

    const API_BASE =
      location.hostname === "localhost"
        ? "http://localhost:5001"
        : "https://mains-ayqd.onrender.com";

    if (!localStorage.getItem("token")) {
      localStorage.setItem("token", "demo-token");
    }

    const chatBox = document.getElementById("chat");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("message");

    /* ================= UI FUNCTIONS ================= */

    function addMsg(text, type) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function newChat() {
      chatBox.innerHTML = "";
      addMsg("Hello! Ask me anything about agriculture 🌱", "bot");
    }

    function toggleTheme() {
      document.body.classList.toggle("dark");
    }

    /* ================= CHAT LOGIC ================= */

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMsg(text, "user");
      input.value = "";

      try {
        const res = await fetch(API_BASE + "/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-auth-token": localStorage.getItem("token")
          },
          body: JSON.stringify({ message: text, language: "en" })
        });

        const data = await res.json();
        addMsg(data.reply || "No response", "bot");
      } catch {
        addMsg("Server not reachable ❌", "bot");
      }
    });

    newChat();
  </script>

</body>
</html>
